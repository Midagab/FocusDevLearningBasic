<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .subscribe-button{
        background-color: rgba(200,0,0,1);
        color: white;
        border: none;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 2px;
        cursor:pointer;
        margin-right: 8px;
        transition: opacity 0.15s;

    }
    .subscribe-button:hover{
       opacity: 0.8;
    }
    .subscribe-button:active{
        opacity: 0.5;
    }
    .join-button{
        background-color: rgba(255,255,255,1);
        color: rgb(6, 95, 212);
        border-color: rgb(6, 95, 212);
        border-style: solid;
        padding-bottom: 9px;
        padding-top: 9px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 2px;
        cursor:pointer;
        transition: background-color 0.15s, color 0.15s;
    }
    .join-button:hover{
        background-color: rgb(6, 95, 212);
        color: white;
    }
    .join-button:active{
        opacity: 0.7;
    }
    .tweet-button{
        background-color: rgb(29, 155, 240);
        color: white;
        border: none;
        height: 36px;
        width: 74 px;
        border-radius: 18px;
        font-weight: bold;
        font-size: 15px;
        margin-left: 8px;
        cursor:pointer;
        transition: opacity 0.15s, box-shadow 0.15s;
       
    }
    .tweet-button:hover{
         box-shadow:5px 5px 10px rgba(0,0,0,0.2);
    }
    .tweet-button:active{
        opacity: 0.7;
    }
</style>
</head>
<body>
    <button class="subscribe-button">
    SUBSCRIBE
</button>
<button class="join-button">
    JOIN
</button>
<button class="tweet-button">
    Tweet
</button>
    
</body>
</html>
